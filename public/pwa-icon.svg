          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M4 16 Q7 10 10 16 T16 16 T22 16 T28 16"
          fill="none" stroke="#34E1C4" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
