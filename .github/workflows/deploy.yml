name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push to main.
# The app is served at andrewrausch.com/parallax/ (a project page under the
# rauscha.github.io user site, which carries the custom domain). No Emscripten
# in CI: braids.wasm + braids.js are committed prebuilt under public/.
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the OIDC + pages scopes deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
